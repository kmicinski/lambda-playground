<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>λ-Calculus Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar: slides down on hover near top -->
        <header id="toolbar">
            <div class="toolbar-left">
                <span class="logo">λ</span>
                <span class="app-title">Calculus Explorer</span>
            </div>
            <div class="toolbar-center">
                <div class="input-group">
                    <input type="text" id="term-input"
                           placeholder="(λ (x) (x x))"
                           spellcheck="false"
                           autocomplete="off" />
                    <button id="parse-btn" class="btn btn-primary">Parse</button>
                </div>
                <select id="examples-select" class="select">
                    <option value="">Examples...</option>
                    <option value="id">I — Identity</option>
                    <option value="omega">Ω — Omega</option>
                    <option value="K">K Combinator</option>
                    <option value="S">S Combinator</option>
                    <option value="skk">S K K</option>
                    <option value="church0">Church 0</option>
                    <option value="church2">Church 2</option>
                    <option value="succ">Successor</option>
                    <option value="Y">Y Combinator</option>
                    <option value="true">True (λ-encoded)</option>
                    <option value="false">False (λ-encoded)</option>
                </select>
            </div>
            <div class="toolbar-right">
                <button id="random-btn" class="btn">Random</button>
                <label class="checkbox-label">
                    <input type="checkbox" id="closed-check" checked />
                    Closed
                </label>
                <div class="separator"></div>
                <button id="undo-btn" class="btn" disabled>Undo</button>
                <div class="separator"></div>
                <div class="zoom-controls">
                    <button id="zoom-out" class="btn btn-icon">−</button>
                    <span id="zoom-level" class="zoom-label">100%</span>
                    <button id="zoom-in" class="btn btn-icon">+</button>
                    <button id="zoom-reset" class="btn btn-icon btn-small">1:1</button>
                </div>
            </div>
        </header>

        <!-- Hover zone to reveal toolbar -->
        <div id="toolbar-trigger"></div>

        <!-- Main viewport -->
        <main id="viewport">
            <div id="term-container">
                <div id="term-display">
                    <div id="empty-state">
                        <div class="empty-icon">λ</div>
                        <p>Enter a term above or choose an example to begin</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Strategy panel (right drawer) -->
        <aside id="strategy-panel" class="panel-closed">
            <div class="panel-header">
                <h2>Reduction Strategy</h2>
                <button id="panel-close" class="btn btn-icon">×</button>
            </div>
            <div class="panel-body">
                <div class="strategy-options">
                    <label class="radio-card">
                        <input type="radio" name="strategy" value="normal" checked />
                        <div class="radio-content">
                            <strong>Normal Order</strong>
                            <span>Leftmost-outermost redex first</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="strategy" value="applicative" />
                        <div class="radio-content">
                            <strong>Applicative Order</strong>
                            <span>Leftmost-innermost redex first</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="strategy" value="cbv" />
                        <div class="radio-content">
                            <strong>Call-by-Value</strong>
                            <span>Arguments to values first; no reduction under λ</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="strategy" value="cbn" />
                        <div class="radio-content">
                            <strong>Call-by-Name</strong>
                            <span>Outermost first; no reduction under λ</span>
                        </div>
                    </label>
                </div>
                <div class="panel-actions">
                    <button id="step-btn" class="btn btn-primary btn-wide">
                        Step →
                    </button>
                    <button id="run-btn" class="btn btn-wide">
                        Auto-run ▶
                    </button>
                    <button id="stop-btn" class="btn btn-wide" style="display:none">
                        Stop ■
                    </button>
                </div>
                <div id="step-info" class="step-info">
                    <span id="step-count">Steps: 0</span>
                    <span id="normal-form-badge" class="badge badge-green" style="display:none">Normal form</span>
                </div>
            </div>
        </aside>
        <button id="strategy-toggle" class="strategy-fab" title="Reduction strategies">
            ⚙
        </button>

        <!-- Context menu (compact symbol buttons) -->
        <div id="context-menu" class="hidden"></div>

        <!-- Alpha rename dialog -->
        <div id="alpha-overlay" class="overlay hidden">
            <div class="dialog">
                <div class="dialog-icon">α</div>
                <div class="dialog-subtitle" id="alpha-info"></div>
                <div class="dialog-input">
                    <input type="text" id="alpha-name" placeholder="new name"
                           spellcheck="false" autocomplete="off" />
                </div>
                <div class="dialog-actions">
                    <button id="alpha-cancel" class="btn">Cancel</button>
                    <button id="alpha-apply" class="btn btn-primary">Rename</button>
                </div>
            </div>
        </div>

        <!-- Derivation tree panel -->
        <div id="tree-panel" class="hidden">
            <div class="tree-panel-header" id="tree-toggle">
                <span>Derivation Tree</span>
            </div>
            <div id="tree-view"></div>
        </div>

        <!-- Status bar -->
        <footer id="status-bar">
            <span id="term-size"></span>
            <span id="term-fv"></span>
            <span id="redex-count"></span>
            <span id="strategy-name"></span>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
